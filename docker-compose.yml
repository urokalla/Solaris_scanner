# Tuned for a typical dev Mac: ~16GB host RAM, Docker Desktop ~8GB / 5 CPUs.
# Per-service mem_limit must fit INSIDE Docker’s RAM — raising Desktop RAM alone does not lift these caps.
# Lite preset (scanner/sidecar/dashboard): heavy extras OFF by default — main RS grid (RS/mRS/RVOL/W_RSI2/BRK/…)
# unchanged; breakout page has less detail until you re-enable flags in .env.example / compose.
# If the VM thrashes: widen DASHBOARD_POLL_INTERVAL_SEC, shrink universe, or `docker compose stop pipeline`.
#
# Per-service `cpus` / `mem_limit` are enforced by `docker compose` (Compose spec); they cap storms.
services:
  # LAYER 1: Database (Metadata & Persistence)
  db:
    image: postgres:13
    container_name: fyers_postgres
    restart: always
    environment:
      POSTGRES_USER: fyers_user
      POSTGRES_PASSWORD: fyers_pass
      POSTGRES_DB: fyers_db
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    # Host-side scripts (eod_sync, etc.) use DB_HOST=localhost — bind loopback only
    ports:
      - "127.0.0.1:5432:5432"
    cpus: "1.0"
    mem_limit: 1g
    networks:
      - sovereign_net
    command: ["postgres", "-c", "max_connections=150"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # LAYER 1: Core Data Pipeline (Parquet Writer)
  pipeline:
    build:
      context: ./fyers_data_pipeline
      dockerfile: Dockerfile
    container_name: fyers_pipeline
    restart: always
    user: "1000:1000"
    depends_on:
      - db
    env_file:
      - ./stock_scanner_sovereign/.env
    volumes:
      - ./fyers_data_pipeline:/app
      # Mount stock_scanner_sovereign outside /app to avoid subpath bind collisions
      # with ./fyers_data_pipeline:/app (which can make pipeline read a stale token copy).
      - ./stock_scanner_sovereign:/workspace_stock_scanner
    environment:
      - DB_HOST=db
      - HOME=/app
      - PYTHONPATH=/workspace_stock_scanner
      - FYERS_ACCESS_TOKEN_PATH=/workspace_stock_scanner/access_token.txt
      # EOD / backoff behavior when the token is expired:
      # - eod_sync exits cleanly (no stacktrace, no hard fail)
      # - scheduler retries at most every EOD_TOKEN_RETRY_MINUTES (default 60) so logs stay quiet
      # - the moment access_token.txt is overwritten on the host, the next tick runs immediately
      - EOD_TOKEN_RETRY_MINUTES=${EOD_TOKEN_RETRY_MINUTES:-60}
      # EOD: append today’s 1D bar (Mon–Fri), only inside IST window starting 16:00 (see main.py)
      - EOD_SYNC_IST_HOUR=16
      - EOD_SYNC_IST_MINUTE=0
      - EOD_SYNC_IST_WINDOW_MINUTES=${EOD_SYNC_IST_WINDOW_MINUTES:-20}
      # EOD: universe_members for EOD_UNIVERSE_ID (default ALL_NSE), only -EQ / -INDEX
      - EOD_UNIVERSE_ID=${EOD_UNIVERSE_ID:-ALL_NSE}
      - EOD_NIFTY500_ONLY=${EOD_NIFTY500_ONLY:-0}
      - EOD_INDEX_ONLY=${EOD_INDEX_ONLY:-0}
      # Gap-heal: refetch any missing interior session bars in the last N days (0 = disabled).
      - EOD_HEAL_DAYS=${EOD_HEAL_DAYS:-30}
      # EOD API pacing (reliability vs duration): 1.0s over ~2200 symbols ≈ ~40m (+heal overhead).
      - EOD_SYNC_PER_SYMBOL_GAP_SECONDS=${EOD_SYNC_PER_SYMBOL_GAP_SECONDS:-1.0}
      - EOD_SYNC_HEAL_GAP_SECONDS=${EOD_SYNC_HEAL_GAP_SECONDS:-0.5}
      # monthly_rsi2_lt2_snapshot: run weekdays after this IST time (default 15:00 = ~pre-close)
      - MONTHLY_RSI2_SNAPSHOT_ENABLED=${MONTHLY_RSI2_SNAPSHOT_ENABLED:-1}
      - MONTHLY_RSI2_SNAPSHOT_IST_HOUR=${MONTHLY_RSI2_SNAPSHOT_IST_HOUR:-15}
      - MONTHLY_RSI2_SNAPSHOT_IST_MINUTE=${MONTHLY_RSI2_SNAPSHOT_IST_MINUTE:-0}
      - PIPELINE_DATA_DIR=/app/data/historical
      - BACKFILL_IST_HOUR=1
      - BACKFILL_IST_MINUTE=0
    cpus: "1.0"
    mem_limit: 1280m
    networks:
      - sovereign_net

  # LAYER 2: Master Scanner (Live Math + SHM Creator)
  scanner:
    build:
      context: .
      dockerfile: stock_scanner_sovereign/frontend_reflex/Dockerfile
    container_name: sovereign_scanner
    restart: always
    user: "1000:1000"
    depends_on:
      - db
      - pipeline
    env_file:
      - ./stock_scanner_sovereign/.env
    volumes:
      - ./stock_scanner_sovereign:/app/stock_scanner_sovereign
      - ./fyers_data_pipeline/data/historical:/app/data/historical
      # So scripts can import fyers_data_pipeline (e.g. backfill_missing_parquet.py)
      - ./fyers_data_pipeline:/app/fyers_data_pipeline:ro
    environment:
      - SHM_MASTER=true
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - FYERS_ACCESS_TOKEN_PATH=/app/stock_scanner_sovereign/access_token.txt
      - HOME=/app/stock_scanner_sovereign
      - PYTHONPATH=/app/stock_scanner_sovereign
      # Full websocket feed includes vol_traded_today; lite mode has no volume (RVOL stays 0).
      - FYERS_WS_LITEMODE=false
      - PIPELINE_DATA_DIR=/app/data/historical
      # Lite main grid: skip weekly mRS “recovery / Below0↑” math in the master scanner (saves CPU).
      # Re-enable: MRS_RCVR_COMPUTE_ENABLED=1
      - MRS_RCVR_COMPUTE_ENABLED=0
      # Skip CANSLIM vector recompute + EPS/merge scoring (saves CPU; rows show 0/6 weak).
      # Re-enable: CANSLIM_ENABLED=1
      - CANSLIM_ENABLED=0
    working_dir: /app/stock_scanner_sovereign
    command: ["python3", "-m", "backend.scanner"]
    cpus: "2.0"
    mem_limit: 2g
    networks:
      - sovereign_net

  # LAYER 3: Strategy Sidecar (Breakout Analyzer - SLAVE)
  sidecar:
    build:
      context: .
      dockerfile: stock_scanner_sovereign/frontend_reflex/Dockerfile
    container_name: sovereign_sidecar
    restart: always
    user: "1000:1000"
    depends_on:
      - scanner
    env_file:
      - ./stock_scanner_sovereign/.env
    volumes:
      - ./stock_scanner_sovereign:/app/stock_scanner_sovereign
      # Same daily Parquet as scanner/dashboard — BreakoutScanner seeds RingBuffers via PipelineBridge
      - ./fyers_data_pipeline/data/historical:/app/fyers_data_pipeline/data/historical
    environment:
      - SHM_MASTER=false
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - HOME=/app/stock_scanner_sovereign
      - PYTHONPATH=/app/stock_scanner_sovereign
      - PIPELINE_DATA_DIR=/app/fyers_data_pipeline/data/historical
      # Sidecar is the OWNER of the heavy BreakoutScanner loop (cycle replay, EMA30, brk_lvl
      # Postgres writes). The dashboard container runs in "lazy mode" (DASHBOARD_BREAKOUT_LOOP=0)
      # and only hydrates visible rows on demand via get_ui_view — this keeps the dashboard CPU
      # free for Reflex while the sidecar's 1 CPU allocation actually gets used.
      - SIDECAR_RUN_ANALYZER=1
      # Heavy per-symbol helpers stay OFF — they feed main-RS-grid columns (mrs_rcvr / stage1_box /
      # m_rsi2 / pre-thrust / Udai Pine) that the UI never renders in this setup.
      - SIDECAR_UDAI_PINE=0
      - SIDECAR_RVCR_ENABLED=0
      - SIDECAR_M_RSI2=0
      - SIDECAR_PRE_THRUST_ENABLED=0
      - SIDECAR_STAGE1_BOX_ENABLED=0
      # Per-tick EMA / signal-line compute that feeds fields NOT rendered by the current breakout
      # grids. Cuts ~5× 900-bar EMA passes per task and the MRS signal-line deque maintenance —
      # ~15-25% of the sidecar's main loop CPU. Re-enable any flag if you bring back the
      # corresponding column (ema_d_str / ema_w_str / tf_ema / "BUY NOW" mRS-cross label).
      - SIDECAR_EMA30_ENABLED=${SIDECAR_EMA30_ENABLED:-0}
      - SIDECAR_EMA_STACK_ENABLED=${SIDECAR_EMA_STACK_ENABLED:-0}
      - SIDECAR_MRS_SIGNAL_ENABLED=${SIDECAR_MRS_SIGNAL_ENABLED:-0}
      # Pace the main loop: cycle tags only change on bar close, so sub-second refresh is wasted CPU.
      - SIDECAR_LOOP_SLEEP_SEC=${SIDECAR_LOOP_SLEEP_SEC:-1.5}
      - SIDECAR_SYNC_WORKERS=${SIDECAR_SYNC_WORKERS:-8}
      - SIDECAR_MAX_TASKS_PER_LOOP=${SIDECAR_MAX_TASKS_PER_LOOP:-30}
      # Udai Pine daily OHLCV refresh cadence (lower = closer to live Pine, higher = less CPU).
      - UDAI_REFRESH_SEC=${UDAI_REFRESH_SEC:-25}
      # Weekly RVCR recompute cache cadence.
      - MRS_RVCR_WEEKLY_REFRESH_SEC=${MRS_RVCR_WEEKLY_REFRESH_SEC:-35}
    working_dir: /app/stock_scanner_sovereign
    command: ["python3", "sidecar.py"]
    cpus: "1.0"
    mem_limit: 896m
    networks:
      - sovereign_net

  # LAYER 4: Dashboard UI (Thin Client - SLAVE)
  dashboard:
    build:
      context: .
      dockerfile: stock_scanner_sovereign/frontend_reflex/Dockerfile
    container_name: sovereign_dashboard
    user: "1000:1000"
    # Dev Reflex: same proven setup as the original Dockerfile (hot reload; reliable WS + polling in Docker).
    command: ["reflex", "run", "--env", "dev", "--backend-host", "0.0.0.0", "--loglevel", "info"]
    restart: always
    depends_on:
      - scanner
    ports:
      - "3000:3000"
      - "8000:8000"
    env_file:
      - ./stock_scanner_sovereign/.env
    volumes:
      - ./stock_scanner_sovereign:/app/stock_scanner_sovereign
      - ./fyers_data_pipeline/data/historical:/app/data/historical
    working_dir: /app/stock_scanner_sovereign/frontend_reflex
    environment:
      # Must match how you open the UI in the browser (same host, port 8000 for Reflex backend WS).
      - API_URL=${API_URL:-http://localhost:8000}
      - SHM_MASTER=false
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - FYERS_ACCESS_TOKEN_PATH=/app/stock_scanner_sovereign/access_token.txt
      - PYTHONPATH=/app/stock_scanner_sovereign
      - HOME=/app/stock_scanner_sovereign
      # Must match volume …/historical:/app/data/historical so BreakoutScanner can read daily Parquet
      - PIPELINE_DATA_DIR=/app/data/historical
      # Dashboard runs in LAZY breakout mode: the BreakoutScanner instance is kept only for
      # get_ui_view (on-demand cycle hydration + SHM-refresh for visible rows). The heavy loop
      # (cycle replay / EMA30 / brk_lvl DB writes) is owned by the sovereign_sidecar container
      # via SIDECAR_RUN_ANALYZER=1. This frees the dashboard's 1 CPU for Reflex/web traffic.
      - DASHBOARD_BREAKOUT_LOOP=${DASHBOARD_BREAKOUT_LOOP:-0}
      - SIDECAR_UDAI_PINE=0
      # Main grid poll interval (lower = fresher UI, higher = less load on host + sidecar).
      - DASHBOARD_POLL_INTERVAL_SEC=${DASHBOARD_POLL_INTERVAL_SEC:-3.5}
      # Universe load speed (sidecar pages): parallel parquet history fetch threads for the
      # on-demand hydration path in get_ui_view. Reads are I/O bound (parquet file open + numpy
      # decode), so more threads = faster hydration on universe switches.
      - SIDECAR_SYNC_WORKERS=${SIDECAR_SYNC_WORKERS:-16}
      - SIDECAR_HISTORY_RETRIES=${SIDECAR_HISTORY_RETRIES:-2}
      - SIDECAR_HISTORY_RETRY_SLEEP=${SIDECAR_HISTORY_RETRY_SLEEP:-1.5}
    cpus: "1.0"
    mem_limit: 1536m
    networks:
      - sovereign_net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # NSE → nse_corporate_announcements.csv every 1 hour by default (Events reads CSV only).
  # Same container also runs Screener EPS → data/screener_eps_snapshot.csv once per IST day after quiet time
  # (default 20:30 IST). No extra service. Disable: SCREENER_EPS_FETCH_ENABLED=0
  events_snapshot_cron:
    build:
      context: .
      dockerfile: stock_scanner_sovereign/frontend_reflex/Dockerfile
    container_name: sovereign_events_snapshot_cron
    restart: always
    user: "1000:1000"
    volumes:
      - ./stock_scanner_sovereign:/app/stock_scanner_sovereign
    working_dir: /app/stock_scanner_sovereign
    environment:
      - PYTHONUNBUFFERED=1
      # Seconds between runs (default 3600 = 1 hour)
      - EVENTS_FETCH_INTERVAL_SEC=${EVENTS_FETCH_INTERVAL_SEC:-3600}
      - EVENTS_FETCH_DAYS=${EVENTS_FETCH_DAYS:-7}
      # Optional: PDF → nse_corporate_announcement_summaries.json (Events UI no longer shows summaries)
      - NSE_ANNOUNCE_SUMMARY_ENABLED=${NSE_ANNOUNCE_SUMMARY_ENABLED:-0}
      - NSE_ANNOUNCE_SUMMARY_MAX_NEW=${NSE_ANNOUNCE_SUMMARY_MAX_NEW:-50}
      - NSE_ANNOUNCE_SUMMARY_SLEEP_SEC=${NSE_ANNOUNCE_SUMMARY_SLEEP_SEC:-0.35}
      # Screener EPS snapshot (prod): nightly window Asia/Kolkata equivalent via fixed +5:30
      - SCREENER_EPS_FETCH_ENABLED=${SCREENER_EPS_FETCH_ENABLED:-1}
      - SCREENER_EPS_IST_HOUR=${SCREENER_EPS_IST_HOUR:-20}
      - SCREENER_EPS_IST_MINUTE=${SCREENER_EPS_IST_MINUTE:-30}
      - SCREENER_EPS_UNIVERSE_CSV=${SCREENER_EPS_UNIVERSE_CSV:-data/nifty_total_market.csv}
      - SCREENER_EPS_SLEEP_SEC=${SCREENER_EPS_SLEEP_SEC:-0.2}
    command: ["sh", "/app/stock_scanner_sovereign/scripts/docker_events_fetch_loop.sh"]
    cpus: "0.15"
    mem_limit: 512m
    networks:
      - sovereign_net

  # NSE -> nse_pit_disclosures.csv + nse_sast_reg29.csv every 3 minutes (Insider reads CSV only).
  insider_snapshot_cron:
    build:
      context: .
      dockerfile: stock_scanner_sovereign/frontend_reflex/Dockerfile
    container_name: sovereign_insider_snapshot_cron
    restart: always
    user: "1000:1000"
    volumes:
      - ./stock_scanner_sovereign:/app/stock_scanner_sovereign
    working_dir: /app/stock_scanner_sovereign
    environment:
      - PYTHONUNBUFFERED=1
      # Seconds between runs (default 180 = 3 minutes)
      - INSIDER_FETCH_INTERVAL_SEC=${INSIDER_FETCH_INTERVAL_SEC:-180}
    command: ["sh", "/app/stock_scanner_sovereign/scripts/docker_insider_fetch_loop.sh"]
    cpus: "0.15"
    mem_limit: 384m
    networks:
      - sovereign_net

  # --- Monitoring (Grafana + Prometheus) ---
  # Omit from default `docker compose up -d` to avoid extra image pulls.
  # Start with:  docker compose --profile monitoring up -d
  # Images avoid docker.io where auth to auth.docker.io fails (EOF): Quay + mirror.gcr.io + gcr.io.
  postgres_exporter:
    profiles: ["monitoring"]
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: sovereign_postgres_exporter
    restart: always
    depends_on:
      - db
    environment:
      # Matches db service creds
      - DATA_SOURCE_NAME=postgresql://fyers_user:fyers_pass@db:5432/fyers_db?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - sovereign_net

  prometheus:
    profiles: ["monitoring"]
    image: quay.io/prometheus/prometheus:latest
    container_name: sovereign_prometheus
    restart: always
    depends_on:
      - postgres_exporter
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - sovereign_net

  grafana:
    profiles: ["monitoring"]
    image: mirror.gcr.io/grafana/grafana:latest
    container_name: sovereign_grafana
    restart: always
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    networks:
      - sovereign_net

  cadvisor:
    profiles: ["monitoring"]
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: sovereign_cadvisor
    restart: always
    privileged: true
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      # Needed on many Docker Desktop / WSL setups so cAdvisor can resolve container metadata
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - sovereign_net

networks:
  sovereign_net:
    driver: bridge

volumes:
  # Declare postgres_data for legacy reasons, though we are using a bind mount now.
  postgres_data:
