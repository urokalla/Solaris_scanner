# Optimized for 12-Core / 8GB RAM System
services:
  # LAYER 1: Database (Metadata & Persistence)
  db:
    image: postgres:13
    container_name: fyers_postgres
    restart: always
    environment:
      POSTGRES_USER: fyers_user
      POSTGRES_PASSWORD: fyers_pass
      POSTGRES_DB: fyers_db
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    # Host-side scripts (eod_sync, etc.) use DB_HOST=localhost — bind loopback only
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - sovereign_net
    command: ["postgres", "-c", "max_connections=300"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # LAYER 1: Core Data Pipeline (Parquet Writer)
  pipeline:
    build:
      context: ./fyers_data_pipeline
      dockerfile: Dockerfile
    container_name: fyers_pipeline
    restart: always
    user: "1000:1000"
    depends_on:
      - db
    env_file:
      - ./stock_scanner_sovereign/.env
    volumes:
      - ./fyers_data_pipeline:/app
      - ./stock_scanner_sovereign:/app/stock_scanner_sovereign
      - ./stock_scanner_sovereign/access_token.txt:/app/stock_scanner_sovereign/access_token.txt
    environment:
      - DB_HOST=db
      - HOME=/app
      - PYTHONPATH=/app/stock_scanner_sovereign
      - FYERS_ACCESS_TOKEN_PATH=/app/stock_scanner_sovereign/access_token.txt
      # EOD: append today’s 1D bar after NSE close (Mon–Fri), default first run after 15:45 IST
      - EOD_SYNC_IST_HOUR=15
      - EOD_SYNC_IST_MINUTE=45
      # monthly_rsi2_lt2_snapshot: run weekdays after this IST time (default 15:00 = ~pre-close)
      - MONTHLY_RSI2_SNAPSHOT_ENABLED=${MONTHLY_RSI2_SNAPSHOT_ENABLED:-1}
      - MONTHLY_RSI2_SNAPSHOT_IST_HOUR=${MONTHLY_RSI2_SNAPSHOT_IST_HOUR:-15}
      - MONTHLY_RSI2_SNAPSHOT_IST_MINUTE=${MONTHLY_RSI2_SNAPSHOT_IST_MINUTE:-0}
      - PIPELINE_DATA_DIR=/app/data/historical
      - BACKFILL_IST_HOUR=1
      - BACKFILL_IST_MINUTE=0
    networks:
      - sovereign_net

  # LAYER 2: Master Scanner (Live Math + SHM Creator)
  scanner:
    build:
      context: .
      dockerfile: stock_scanner_sovereign/frontend_reflex/Dockerfile
    container_name: sovereign_scanner
    restart: always
    user: "1000:1000"
    depends_on:
      - db
      - pipeline
    env_file:
      - ./stock_scanner_sovereign/.env
    volumes:
      - /home/udai/RS_PROJECT/stock_scanner_sovereign:/app/stock_scanner_sovereign
      - /home/udai/RS_PROJECT/fyers_data_pipeline/data/historical:/app/data/historical
      # So scripts can import fyers_data_pipeline (e.g. backfill_missing_parquet.py)
      - ./fyers_data_pipeline:/app/fyers_data_pipeline:ro
      - /home/udai/RS_PROJECT/stock_scanner_sovereign/access_token.txt:/app/stock_scanner_sovereign/access_token.txt
    environment:
      - SHM_MASTER=true
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - FYERS_ACCESS_TOKEN_PATH=/app/stock_scanner_sovereign/access_token.txt
      - HOME=/app/stock_scanner_sovereign
      - PYTHONPATH=/app/stock_scanner_sovereign
      # Full websocket feed includes vol_traded_today; lite mode has no volume (RVOL stays 0).
      - FYERS_WS_LITEMODE=false
      - PIPELINE_DATA_DIR=/app/data/historical
    working_dir: /app/stock_scanner_sovereign
    command: ["python3", "-m", "backend.scanner"]
    networks:
      - sovereign_net

  # LAYER 3: Strategy Sidecar (Breakout Analyzer - SLAVE)
  sidecar:
    build:
      context: .
      dockerfile: stock_scanner_sovereign/frontend_reflex/Dockerfile
    container_name: sovereign_sidecar
    restart: always
    user: "1000:1000"
    depends_on:
      - scanner
    env_file:
      - ./stock_scanner_sovereign/.env
    volumes:
      - ./stock_scanner_sovereign:/app/stock_scanner_sovereign
      # Same daily Parquet as scanner/dashboard — BreakoutScanner seeds RingBuffers via PipelineBridge
      - ./fyers_data_pipeline/data/historical:/app/fyers_data_pipeline/data/historical
    environment:
      - SHM_MASTER=false
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - HOME=/app/stock_scanner_sovereign
      - PYTHONPATH=/app/stock_scanner_sovereign
      - PIPELINE_DATA_DIR=/app/fyers_data_pipeline/data/historical
      - SIDECAR_UDAI_PINE=${SIDECAR_UDAI_PINE:-1}
    working_dir: /app/stock_scanner_sovereign
    command: ["python3", "sidecar.py"]
    networks:
      - sovereign_net

  # LAYER 4: Dashboard UI (Thin Client - SLAVE)
  dashboard:
    build:
      context: .
      dockerfile: stock_scanner_sovereign/frontend_reflex/Dockerfile
    container_name: sovereign_dashboard
    restart: always
    user: "1000:1000"
    depends_on:
      - scanner
    ports:
      - "3000:3000"
      - "8000:8000"
    env_file:
      - ./stock_scanner_sovereign/.env
    volumes:
      - ./stock_scanner_sovereign:/app/stock_scanner_sovereign
      - /home/udai/RS_PROJECT/fyers_data_pipeline/data/historical:/app/data/historical
    working_dir: /app/stock_scanner_sovereign/frontend_reflex
    environment:
      - SHM_MASTER=false
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - FYERS_ACCESS_TOKEN_PATH=/app/stock_scanner_sovereign/access_token.txt
      - PYTHONPATH=/app/stock_scanner_sovereign
      - HOME=/app/stock_scanner_sovereign
      # Must match volume …/historical:/app/data/historical so BreakoutScanner can read daily Parquet
      - PIPELINE_DATA_DIR=/app/data/historical
      # Udai Pine column: set SIDECAR_UDAI_PINE=0 in .env to disable
      - SIDECAR_UDAI_PINE=${SIDECAR_UDAI_PINE:-1}
    networks:
      - sovereign_net
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # --- Monitoring (Grafana + Prometheus) ---
  # Omit from default `docker compose up -d` to avoid extra image pulls.
  # Start with:  docker compose --profile monitoring up -d
  # Images avoid docker.io where auth to auth.docker.io fails (EOF): Quay + mirror.gcr.io + gcr.io.
  postgres_exporter:
    profiles: ["monitoring"]
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: sovereign_postgres_exporter
    restart: always
    depends_on:
      - db
    environment:
      # Matches db service creds
      - DATA_SOURCE_NAME=postgresql://fyers_user:fyers_pass@db:5432/fyers_db?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - sovereign_net

  prometheus:
    profiles: ["monitoring"]
    image: quay.io/prometheus/prometheus:latest
    container_name: sovereign_prometheus
    restart: always
    depends_on:
      - postgres_exporter
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - sovereign_net

  grafana:
    profiles: ["monitoring"]
    image: mirror.gcr.io/grafana/grafana:latest
    container_name: sovereign_grafana
    restart: always
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    networks:
      - sovereign_net

  cadvisor:
    profiles: ["monitoring"]
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: sovereign_cadvisor
    restart: always
    privileged: true
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      # Needed on many Docker Desktop / WSL setups so cAdvisor can resolve container metadata
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - sovereign_net

networks:
  sovereign_net:
    driver: bridge

volumes:
  # Declare postgres_data for legacy reasons, though we are using a bind mount now.
  postgres_data:
