# Optimized for 12-Core / 8GB RAM System
services:
  # LAYER 1: Database (Metadata & Persistence)
  db:
    image: postgres:13
    container_name: fyers_postgres
    restart: always
    environment:
      POSTGRES_USER: fyers_user
      POSTGRES_PASSWORD: fyers_pass
      POSTGRES_DB: fyers_db
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - sovereign_net
    command: ["postgres", "-c", "max_connections=300"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # LAYER 1: Core Data Pipeline (Parquet Writer)
  pipeline:
    build:
      context: ./fyers_data_pipeline
      dockerfile: Dockerfile
    container_name: fyers_pipeline
    restart: always
    user: "1000:1000"
    depends_on:
      - db
    env_file:
      - ./stock_scanner_sovereign/.env
    volumes:
      - ./fyers_data_pipeline:/app
      - ./stock_scanner_sovereign/data:/app/stock_scanner_sovereign/data
      - ./stock_scanner_sovereign/access_token.txt:/app/stock_scanner_sovereign/access_token.txt
    environment:
      - DB_HOST=db
      - HOME=/app
      - FYERS_ACCESS_TOKEN_PATH=/app/stock_scanner_sovereign/access_token.txt
    networks:
      - sovereign_net

  # LAYER 2: Master Scanner (Live Math + SHM Creator)
  scanner:
    build:
      context: .
      dockerfile: stock_scanner_sovereign/frontend_reflex/Dockerfile
    container_name: sovereign_scanner
    restart: always
    user: "1000:1000"
    depends_on:
      - db
      - pipeline
    env_file:
      - ./stock_scanner_sovereign/.env
    volumes:
      - /home/udai/RS_PROJECT/stock_scanner_sovereign:/app/stock_scanner_sovereign
      - /home/udai/RS_PROJECT/fyers_data_pipeline/data/historical:/app/data/historical
      - /home/udai/RS_PROJECT/stock_scanner_sovereign/access_token.txt:/app/stock_scanner_sovereign/access_token.txt
    environment:
      - SHM_MASTER=true
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - FYERS_ACCESS_TOKEN_PATH=/app/stock_scanner_sovereign/access_token.txt
      - HOME=/app/stock_scanner_sovereign
      # Full websocket feed includes vol_traded_today; lite mode has no volume (RVOL stays 0).
      - FYERS_WS_LITEMODE=false
      - PIPELINE_DATA_DIR=/app/data/historical
    working_dir: /app/stock_scanner_sovereign
    command: ["python3", "-m", "backend.scanner"]
    networks:
      - sovereign_net

  # LAYER 3: Strategy Sidecar (Breakout Analyzer - SLAVE)
  sidecar:
    build:
      context: .
      dockerfile: stock_scanner_sovereign/frontend_reflex/Dockerfile
    container_name: sovereign_sidecar
    restart: always
    user: "1000:1000"
    depends_on:
      - scanner
    env_file:
      - ./stock_scanner_sovereign/.env
    volumes:
      - ./stock_scanner_sovereign:/app/stock_scanner_sovereign
      # Same daily Parquet as scanner/dashboard — BreakoutScanner seeds RingBuffers via PipelineBridge
      - ./fyers_data_pipeline/data/historical:/app/fyers_data_pipeline/data/historical
    environment:
      - SHM_MASTER=false
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - HOME=/app/stock_scanner_sovereign
      - PIPELINE_DATA_DIR=/app/fyers_data_pipeline/data/historical
    working_dir: /app/stock_scanner_sovereign
    command: ["python3", "sidecar.py"]
    networks:
      - sovereign_net

  # LAYER 4: Dashboard UI (Thin Client - SLAVE)
  dashboard:
    build:
      context: .
      dockerfile: stock_scanner_sovereign/frontend_reflex/Dockerfile
    container_name: sovereign_dashboard
    restart: always
    user: "1000:1000"
    depends_on:
      - scanner
    ports:
      - "3000:3000"
      - "8000:8000"
    env_file:
      - ./stock_scanner_sovereign/.env
    volumes:
      - ./stock_scanner_sovereign:/app/stock_scanner_sovereign
      - /home/udai/RS_PROJECT/fyers_data_pipeline/data/historical:/app/data/historical
    working_dir: /app/stock_scanner_sovereign/frontend_reflex
    environment:
      - SHM_MASTER=false
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - FYERS_ACCESS_TOKEN_PATH=/app/stock_scanner_sovereign/access_token.txt
      - PYTHONPATH=/app/stock_scanner_sovereign
      - HOME=/app/stock_scanner_sovereign
    networks:
      - sovereign_net
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

networks:
  sovereign_net:
    driver: bridge

volumes:
  # Declare postgres_data for legacy reasons, though we are using a bind mount now.
  postgres_data:
